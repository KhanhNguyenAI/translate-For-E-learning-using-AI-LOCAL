<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Segoe UI, sans-serif">
  <rect width="900" height="360" rx="12" fill="#0d1117"/>
  <text x="450" y="32" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="bold">Key Features</text>

  <!-- Row 1 -->
  <rect x="20" y="55" width="270" height="130" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="155" y="82" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Multi-Language STT</text>
  <text x="155" y="104" text-anchor="middle" fill="#8b949e" font-size="11">Whisper medium — 99 languages</text>
  <text x="155" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">🇯🇵 🇬🇧 🇨🇳 🇲🇲 🇻🇳</text>
  <text x="155" y="146" text-anchor="middle" fill="#8b949e" font-size="11">Select input/output before start</text>
  <text x="155" y="166" text-anchor="middle" fill="#3fb950" font-size="10">VAD + Hallucination filter</text>

  <rect x="315" y="55" width="270" height="130" rx="10" fill="#161b22" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="82" text-anchor="middle" fill="#d97706" font-size="14" font-weight="bold">Local AI Translation</text>
  <text x="450" y="104" text-anchor="middle" fill="#8b949e" font-size="11">Qwen 3 1.7B — fully offline</text>
  <text x="450" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">Zero cost • GPU accelerated</text>
  <text x="450" y="146" text-anchor="middle" fill="#8b949e" font-size="11">Few-shot examples per lang pair</text>
  <text x="450" y="166" text-anchor="middle" fill="#3fb950" font-size="10">Custom terms editor (terms.json)</text>

  <rect x="610" y="55" width="270" height="130" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="745" y="82" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">Speaker Diarization</text>
  <text x="745" y="104" text-anchor="middle" fill="#8b949e" font-size="11">pyannote.audio 3.1</text>
  <text x="745" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">Color-coded speakers A-E</text>
  <text x="745" y="146" text-anchor="middle" fill="#8b949e" font-size="11">Embedding-based identity</text>
  <text x="745" y="166" text-anchor="middle" fill="#3fb950" font-size="10">Consistent across chunks</text>

  <!-- Row 2 -->
  <rect x="20" y="205" width="270" height="130" rx="10" fill="#161b22" stroke="#0078d4" stroke-width="1"/>
  <text x="155" y="232" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">AI Assistant (1-Click)</text>
  <text x="155" y="254" text-anchor="middle" fill="#8b949e" font-size="11">Split button: click = send</text>
  <rect x="55" y="264" width="60" height="22" rx="4" fill="#0078d4" fill-opacity="0.3"/>
  <text x="85" y="280" text-anchor="middle" fill="#58a6ff" font-size="10">Copilot</text>
  <rect x="120" y="264" width="60" height="22" rx="4" fill="#d97706" fill-opacity="0.3"/>
  <text x="150" y="280" text-anchor="middle" fill="#d97706" font-size="10">Claude</text>
  <rect x="185" y="264" width="60" height="22" rx="4" fill="#10a37f" fill-opacity="0.3"/>
  <text x="215" y="280" text-anchor="middle" fill="#10a37f" font-size="10">ChatGPT</text>
  <text x="155" y="314" text-anchor="middle" fill="#8b949e" font-size="11">Auto paste + send via Win32 API</text>

  <rect x="315" y="205" width="270" height="130" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="450" y="232" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">Dual Panel UI</text>
  <text x="450" y="254" text-anchor="middle" fill="#8b949e" font-size="11">Source + Translation side by side</text>
  <text x="450" y="276" text-anchor="middle" fill="#c9d1d9" font-size="12">PanedWindow • Draggable divider</text>
  <text x="450" y="298" text-anchor="middle" fill="#8b949e" font-size="11">FIFO segment pairing (seg_id)</text>
  <text x="450" y="318" text-anchor="middle" fill="#3fb950" font-size="10">Smart scroll • Always-on-top</text>

  <rect x="610" y="205" width="270" height="130" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="745" y="232" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="bold">Audio Flexibility</text>
  <text x="745" y="254" text-anchor="middle" fill="#8b949e" font-size="11">WASAPI Loopback (speaker)</text>
  <text x="745" y="276" text-anchor="middle" fill="#c9d1d9" font-size="12">+ Microphone input</text>
  <text x="745" y="298" text-anchor="middle" fill="#8b949e" font-size="11">Toggle with radio buttons</text>
  <text x="745" y="318" text-anchor="middle" fill="#3fb950" font-size="10">Device selector per mode</text>
</svg>
