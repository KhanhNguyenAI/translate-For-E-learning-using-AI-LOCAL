<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#58a6ff"/>
    </marker>
    <marker id="b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#d97706"/>
    </marker>
    <marker id="c" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#3fb950"/>
    </marker>
  </defs>
  <rect width="900" height="300" rx="12" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="bold">Data Flow Pipeline</text>

  <!-- Step 1: Audio -->
  <rect x="20" y="60" width="120" height="70" rx="8" fill="#1a1a2e" stroke="#5865f2" stroke-width="1.5"/>
  <text x="80" y="86" text-anchor="middle" fill="#5865f2" font-size="12" font-weight="bold">Audio In</text>
  <text x="80" y="104" text-anchor="middle" fill="#8b949e" font-size="10">Loopback / Mic</text>
  <text x="80" y="118" text-anchor="middle" fill="#8b949e" font-size="10">WASAPI 48kHz</text>

  <!-- Arrow -->
  <line x1="140" y1="95" x2="170" y2="95" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2: Resample -->
  <rect x="175" y="60" width="110" height="70" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="230" y="86" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">Resample</text>
  <text x="230" y="104" text-anchor="middle" fill="#8b949e" font-size="10">→ 16kHz mono</text>
  <text x="230" y="118" text-anchor="middle" fill="#8b949e" font-size="10">RMS filter</text>

  <!-- Arrow -->
  <line x1="285" y1="95" x2="315" y2="95" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3: Whisper -->
  <rect x="320" y="50" width="140" height="90" rx="10" fill="#1a2744" stroke="#58a6ff" stroke-width="2"/>
  <text x="390" y="78" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Whisper STT</text>
  <text x="390" y="96" text-anchor="middle" fill="#8b949e" font-size="10">faster-whisper</text>
  <text x="390" y="112" text-anchor="middle" fill="#8b949e" font-size="10">GPU • beam=2</text>
  <text x="390" y="128" text-anchor="middle" fill="#3fb950" font-size="10">VAD + halluc filter</text>

  <!-- Branch arrows -->
  <line x1="460" y1="80" x2="500" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>
  <line x1="460" y1="120" x2="500" y2="180" stroke="#d97706" stroke-width="2" marker-end="url(#b)"/>

  <!-- Step 4a: Panel Left -->
  <rect x="505" y="55" width="130" height="55" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="570" y="78" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Panel Left</text>
  <text x="570" y="96" text-anchor="middle" fill="#8b949e" font-size="10">Source text + Speaker</text>

  <!-- Step 4b: Qwen -->
  <rect x="505" y="155" width="130" height="70" rx="10" fill="#2d1a00" stroke="#d97706" stroke-width="2"/>
  <text x="570" y="180" text-anchor="middle" fill="#d97706" font-size="13" font-weight="bold">Qwen 3 1.7B</text>
  <text x="570" y="198" text-anchor="middle" fill="#8b949e" font-size="10">Translation GPU</text>
  <text x="570" y="214" text-anchor="middle" fill="#8b949e" font-size="10">FIFO seg_id match</text>

  <!-- Arrow Qwen → Panel Right -->
  <line x1="635" y1="190" x2="670" y2="190" stroke="#d97706" stroke-width="2" marker-end="url(#b)"/>

  <!-- Step 5: Panel Right -->
  <rect x="675" y="160" width="130" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="740" y="183" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Panel Right</text>
  <text x="740" y="201" text-anchor="middle" fill="#8b949e" font-size="10">Translation output</text>

  <!-- AI Assistant flow -->
  <line x1="570" y1="110" x2="570" y2="244" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>
  <line x1="570" y1="248" x2="500" y2="248" stroke="#0078d4" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="340" y="235" width="160" height="50" rx="8" fill="#161b22" stroke="#0078d4" stroke-width="1.5"/>
  <text x="420" y="256" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">AI Assistant</text>
  <text x="420" y="273" text-anchor="middle" fill="#8b949e" font-size="10">Copilot / Claude / ChatGPT</text>

  <!-- Legend -->
  <rect x="680" y="240" width="200" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <line x1="690" y1="256" x2="720" y2="256" stroke="#58a6ff" stroke-width="2"/>
  <text x="725" y="260" fill="#8b949e" font-size="10">STT pipeline</text>
  <line x1="690" y1="276" x2="720" y2="276" stroke="#d97706" stroke-width="2"/>
  <text x="725" y="280" fill="#8b949e" font-size="10">Translation pipeline</text>
</svg>
