<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, sans-serif">
  <!-- Window frame -->
  <rect width="960" height="520" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect width="960" height="32" rx="8" fill="#161b22"/>
  <rect y="24" width="960" height="8" fill="#161b22"/>
  <circle cx="18" cy="16" r="6" fill="#f85149"/>
  <circle cx="38" cy="16" r="6" fill="#d29922"/>
  <circle cx="58" cy="16" r="6" fill="#3fb950"/>
  <text x="480" y="20" text-anchor="middle" fill="#8b949e" font-size="12">Interview STT — Tiếng Nhật → Tiếng Việt</text>

  <!-- Toolbar -->
  <rect x="8" y="40" width="944" height="36" rx="6" fill="#161b22"/>

  <!-- Lang pair -->
  <rect x="14" y="46" width="110" height="24" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="69" y="63" text-anchor="middle" fill="#8b949e" font-size="11">🇯🇵 Tiếng Nhật</text>
  <text x="133" y="63" fill="#888" font-size="12" font-weight="bold">→</text>
  <rect x="142" y="46" width="110" height="24" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="197" y="63" text-anchor="middle" fill="#8b949e" font-size="11">🇻🇳 Tiếng Việt</text>

  <!-- Start -->
  <rect x="262" y="46" width="72" height="24" rx="4" fill="#2e7d32"/>
  <text x="298" y="63" text-anchor="middle" fill="white" font-size="12" font-weight="bold">▶ Start</text>

  <!-- Separator -->
  <line x1="344" y1="48" x2="344" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- Text actions -->
  <rect x="354" y="46" width="30" height="24" rx="4" fill="#21262d"/>
  <text x="369" y="63" text-anchor="middle" fill="#c9d1d9" font-size="11">🗑</text>
  <rect x="388" y="46" width="36" height="24" rx="4" fill="#21262d"/>
  <text x="406" y="63" text-anchor="middle" fill="#c9d1d9" font-size="10">📋L</text>
  <rect x="428" y="46" width="36" height="24" rx="4" fill="#21262d"/>
  <text x="446" y="63" text-anchor="middle" fill="#c9d1d9" font-size="10">📋R</text>

  <!-- Separator -->
  <line x1="474" y1="48" x2="474" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- AI button (split) -->
  <rect x="484" y="46" width="92" height="24" rx="4" fill="#0078d4"/>
  <text x="530" y="63" text-anchor="middle" fill="white" font-size="11" font-weight="bold">🤖 Copilot</text>
  <rect x="576" y="46" width="24" height="24" rx="4" fill="#005a9e"/>
  <text x="588" y="63" text-anchor="middle" fill="white" font-size="11">▾</text>

  <!-- Separator -->
  <line x1="610" y1="48" x2="610" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- Toggles -->
  <rect x="620" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="634" y="63" text-anchor="middle" fill="#aaa" font-size="12">👥</text>
  <rect x="652" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="666" y="63" text-anchor="middle" fill="#64b5f6" font-size="12">🌐</text>
  <rect x="684" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="698" y="63" text-anchor="middle" fill="#c9d1d9" font-size="12">📖</text>
  <rect x="716" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="730" y="63" text-anchor="middle" fill="#c9d1d9" font-size="11">A-</text>
  <rect x="748" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="762" y="63" text-anchor="middle" fill="#c9d1d9" font-size="11">A+</text>
  <rect x="780" y="46" width="28" height="24" rx="4" fill="#21262d"/>
  <text x="794" y="63" text-anchor="middle" fill="#c9d1d9" font-size="12">⚙</text>

  <!-- Row 2: Audio -->
  <rect x="8" y="80" width="944" height="28" rx="4" fill="#0d1117"/>
  <rect x="14" y="83" width="56" height="20" rx="10" fill="#1a2744"/>
  <text x="42" y="97" text-anchor="middle" fill="#64b5f6" font-size="10">🔊 Loa</text>
  <rect x="74" y="83" width="52" height="20" rx="10" fill="#21262d"/>
  <text x="100" y="97" text-anchor="middle" fill="#ffb74d" font-size="10">🎙 Mic</text>
  <rect x="134" y="83" width="360" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <text x="314" y="97" text-anchor="middle" fill="#8b949e" font-size="10">Speakers (Realtek High Definition Audio) [Loopback]</text>
  <text x="520" y="97" fill="#555" font-size="10">Đang nghe...  [████████████░░░░░░░░]  0.0312</text>

  <!-- Dual Panel -->
  <rect x="8" y="114" width="470" height="398" rx="6" fill="#111" stroke="#21262d" stroke-width="1"/>
  <rect x="8" y="114" width="470" height="22" rx="6" fill="#0d1117"/>
  <rect x="8" y="128" width="470" height="8" fill="#0d1117"/>
  <text x="20" y="130" fill="#58a6ff" font-size="11" font-weight="bold">🇯🇵 Tiếng Nhật</text>

  <!-- JP text content -->
  <text x="20" y="160" fill="#64b5f6" font-size="14">🎙 Speaker A</text>
  <text x="20" y="184" fill="#eee" font-size="15">面接にお越しいただきありがとうございます。</text>
  <text x="20" y="210" fill="#eee" font-size="15">まず、自己紹介をお願いします。</text>
  <text x="20" y="244" fill="#81c784" font-size="14">🎙 Speaker B</text>
  <text x="20" y="268" fill="#eee" font-size="15">はい、カインと申します。ベトナム出身で、</text>
  <text x="20" y="294" fill="#eee" font-size="15">IT業界で3年間の経験があります。</text>
  <text x="20" y="328" fill="#64b5f6" font-size="14">🎙 Speaker A</text>
  <text x="20" y="352" fill="#eee" font-size="15">どうしてこの会社を選びましたか？</text>
  <text x="20" y="386" fill="#81c784" font-size="14">🎙 Speaker B</text>
  <text x="20" y="410" fill="#eee" font-size="15">御社のAI技術に興味があり、自分のスキルを</text>
  <text x="20" y="436" fill="#eee" font-size="15">活かせると思ったからです。</text>

  <!-- Divider -->
  <rect x="480" y="114" width="4" height="398" fill="#30363d"/>

  <!-- VI panel -->
  <rect x="486" y="114" width="466" height="398" rx="6" fill="#111" stroke="#21262d" stroke-width="1"/>
  <rect x="486" y="114" width="466" height="22" rx="6" fill="#0d1117"/>
  <rect x="486" y="128" width="466" height="8" fill="#0d1117"/>
  <text x="498" y="130" fill="#3fb950" font-size="11" font-weight="bold">🇻🇳 Tiếng Việt</text>

  <!-- VI text content -->
  <text x="498" y="184" fill="#aff3c3" font-size="15">Cảm ơn bạn đã đến phỏng vấn.</text>
  <text x="498" y="210" fill="#aff3c3" font-size="15">Đầu tiên, xin hãy tự giới thiệu bản thân.</text>
  <text x="498" y="268" fill="#aff3c3" font-size="15">Vâng, tôi tên là Khánh. Tôi đến từ Việt Nam,</text>
  <text x="498" y="294" fill="#aff3c3" font-size="15">có 3 năm kinh nghiệm trong ngành IT.</text>
  <text x="498" y="352" fill="#aff3c3" font-size="15">Tại sao bạn chọn công ty này?</text>
  <text x="498" y="410" fill="#aff3c3" font-size="15">Tôi quan tâm đến công nghệ AI của quý công ty</text>
  <text x="498" y="436" fill="#aff3c3" font-size="15">và nghĩ rằng có thể phát huy kỹ năng của mình.</text>

  <!-- Placeholder spinner -->
  <text x="498" y="474" fill="#555" font-size="14">⏳ ...</text>
</svg>
