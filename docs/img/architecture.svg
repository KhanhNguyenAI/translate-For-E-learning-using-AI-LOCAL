<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64b5f6"/>
    </marker>
  </defs>
  <rect width="900" height="420" rx="12" fill="#0d1117"/>

  <text x="450" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">System Architecture</text>

  <!-- Audio Sources -->
  <rect x="20" y="60" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#5865f2" stroke-width="1.5"/>
  <text x="90" y="86" text-anchor="middle" fill="#5865f2" font-size="13" font-weight="bold">WASAPI Loopback</text>
  <text x="90" y="104" text-anchor="middle" fill="#888" font-size="11">Speaker Audio</text>

  <rect x="20" y="135" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="90" y="161" text-anchor="middle" fill="#ffb74d" font-size="13" font-weight="bold">Microphone</text>
  <text x="90" y="179" text-anchor="middle" fill="#888" font-size="11">Mic Input</text>

  <!-- Arrow to Whisper -->
  <line x1="160" y1="90" x2="210" y2="165" stroke="#64b5f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="165" x2="210" y2="165" stroke="#64b5f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Whisper -->
  <rect x="215" y="120" width="180" height="90" rx="10" fill="#1a2744" stroke="#58a6ff" stroke-width="2"/>
  <text x="305" y="150" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Whisper Medium</text>
  <text x="305" y="170" text-anchor="middle" fill="#8b949e" font-size="11">faster-whisper (GPU)</text>
  <text x="305" y="188" text-anchor="middle" fill="#8b949e" font-size="11">99 languages • CUDA</text>
  <text x="305" y="202" text-anchor="middle" fill="#3fb950" font-size="10">~2 GB VRAM</text>

  <!-- Arrow Whisper → Branch -->
  <line x1="395" y1="155" x2="445" y2="120" stroke="#64b5f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="395" y1="175" x2="445" y2="230" stroke="#64b5f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Qwen -->
  <rect x="450" y="80" width="180" height="80" rx="10" fill="#2d1a00" stroke="#d97706" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" fill="#d97706" font-size="14" font-weight="bold">Qwen 3 1.7B</text>
  <text x="540" y="126" text-anchor="middle" fill="#8b949e" font-size="11">Local Translation (GPU)</text>
  <text x="540" y="144" text-anchor="middle" fill="#3fb950" font-size="10">~2.5 GB VRAM</text>

  <!-- Diarization -->
  <rect x="450" y="200" width="180" height="70" rx="10" fill="#1a2e1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="540" y="228" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">pyannote.audio</text>
  <text x="540" y="248" text-anchor="middle" fill="#8b949e" font-size="11">Speaker Diarization</text>

  <!-- Arrow to UI -->
  <line x1="630" y1="120" x2="680" y2="165" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="235" x2="680" y2="190" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UI Panel -->
  <rect x="685" y="100" width="195" height="130" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="2"/>
  <text x="782" y="125" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="bold">Dual Panel UI</text>
  <rect x="695" y="135" width="85" height="40" rx="4" fill="#111" stroke="#58a6ff" stroke-width="1"/>
  <text x="737" y="160" text-anchor="middle" fill="#58a6ff" font-size="10">Source Text</text>
  <rect x="785" y="135" width="85" height="40" rx="4" fill="#111" stroke="#3fb950" stroke-width="1"/>
  <text x="827" y="160" text-anchor="middle" fill="#3fb950" font-size="10">Translation</text>
  <text x="782" y="198" text-anchor="middle" fill="#8b949e" font-size="10">Tkinter • Always-on-top</text>
  <text x="782" y="215" text-anchor="middle" fill="#8b949e" font-size="10">Smart Scroll • FIFO</text>

  <!-- AI Assistants -->
  <rect x="250" y="300" width="420" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="460" y="325" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="bold">AI Assistant Integration (1-click)</text>

  <rect x="270" y="340" width="110" height="45" rx="6" fill="#0078d4" fill-opacity="0.2" stroke="#0078d4" stroke-width="1"/>
  <text x="325" y="362" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Copilot</text>
  <text x="325" y="377" text-anchor="middle" fill="#8b949e" font-size="9">Window Automation</text>

  <rect x="395" y="340" width="110" height="45" rx="6" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="362" text-anchor="middle" fill="#d97706" font-size="12" font-weight="bold">Claude</text>
  <text x="450" y="377" text-anchor="middle" fill="#8b949e" font-size="9">Window Automation</text>

  <rect x="520" y="340" width="110" height="45" rx="6" fill="#10a37f" fill-opacity="0.2" stroke="#10a37f" stroke-width="1"/>
  <text x="575" y="362" text-anchor="middle" fill="#10a37f" font-size="12" font-weight="bold">ChatGPT</text>
  <text x="575" y="377" text-anchor="middle" fill="#8b949e" font-size="9">Window Automation</text>

  <!-- GPU badge -->
  <rect x="20" y="360" width="180" height="40" rx="6" fill="#1a2e1a" stroke="#3fb950" stroke-width="1"/>
  <text x="110" y="378" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">RTX 4060 • 8 GB VRAM</text>
  <text x="110" y="394" text-anchor="middle" fill="#8b949e" font-size="10">~4.5 GB used (Whisper+Qwen)</text>
</svg>
